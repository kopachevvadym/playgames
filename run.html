<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freej2me-web</title>
</head>
<style>
    html, body {
        height: 100%;
    }
    body {
        margin: 0;
        padding: 0;
        font-family: sans;
    }
    #screen-area {
        background-color: #eee;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #display {
        background-color: white;
        zoom: 1;
        image-rendering: pixelated; /* affects zoom */
    }
    #display:focus {
        outline: none;
    }
    /* PlayStation-style boot screen shown while the game loads */
    #loading {
        position: fixed;
        inset: 0;
        z-index: 50;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
            radial-gradient(ellipse 60% 45% at 50% 45%, #0a1330 0%, rgba(3,5,15,0) 70%),
            #000;
        color: #cfd6e6;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    #loading[hidden] { display: none; }

    .ps-sce {
        position: absolute;
        top: 33%;
        font-size: clamp(11px, 2.6vw, 15px);
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: #eef1f8;
        padding-left: 0.42em;
        white-space: nowrap;
        opacity: 0;
        animation: ps-sce 3.4s ease forwards;
    }

    @keyframes ps-sce {
        0%, 12%  { opacity: 0; }
        28%      { opacity: 1; }
        56%      { opacity: 1; }
        72%, 100%{ opacity: 0; }
    }

    .ps-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        opacity: 0;
        transform: scale(0.9);
        animation: ps-logo-in 1.1s cubic-bezier(.2,.7,.2,1) 1.95s forwards;
        filter: drop-shadow(0 0 24px rgba(45,95,220,0.3));
    }

    @keyframes ps-logo-in {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
    }

    .ps-logo svg {
        width: clamp(180px, 44vw, 270px);
        height: auto;
        display: block;
    }

    .ps-wordmark {
        font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-style: italic;
        letter-spacing: -0.01em;
        font-size: clamp(30px, 8vw, 54px);
        line-height: 1;
        background: linear-gradient(#ffffff, #b7c3dd);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .ps-status {
        position: absolute;
        bottom: 8%;
        font-size: clamp(11px, 2.4vw, 14px);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #7c86a2;
        animation: ps-status-pulse 1.6s ease-in-out infinite;
    }

    @keyframes ps-status-pulse {
        0%, 100% { opacity: 0.4; }
        50%      { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
        .ps-sce { display: none; }
        .ps-logo { animation: none; opacity: 1; transform: none; }
        .ps-status { animation: none; opacity: 0.8; }
    }

    .keypad-part {
        background-color: #222; /* Dark background for keypad areas */
        padding: 8px;
        display: flex; /* Use flex to center the grid */
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent; /* Disable tap highlight on mobile */
    }

    .key-grid {
        display: grid;
        gap: 6px; /* Space between keys */
        width: 100%;
        height: 100%;
    }

    /* Grid definitions */
    .left-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
    }

    .right-grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
    }

    /* Individual Key Styles */
    .key {
        background-color: #3a3a3a; /* Dark key background */
        color: #e0e0e0; /* Light key text */
        border: 1px solid #555;
        border-radius: 5px;
        font-size: 1.5em; /* Larger text */
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column; /* Allow stacking number/letters */
        align-items: center;
        justify-content: center;
        text-align: center;
        user-select: none; /* Prevent text selection on click/drag */
        transition: background-color 0.1s ease, transform 0.05s ease;
        line-height: 1.1;
    }
    .key span { /* Style for secondary text like ABC */
        font-size: 0.4em;
        font-weight: normal;
        margin-top: 2px;
        color: #aaa;
    }

    .key.active {
        background-color: #6a6a6a;
        transform: scale(0.95); /* Slight shrink effect on press */
    }

    .arrow-key {
        font-size: 2em; /* Make arrows bigger */
    }

    .ok-key {
        font-size: 1.3em;
    }

    /* Styles for specifically smaller keys */
    .small-key {
        /* Instead of scaling the whole button, we control its size within the grid cell */
        width: 70%;
        height: 70%;
        font-size: 0.9em;
        align-self: end;   /* Center vertically in grid cell */
        /* Ensure padding/border don't make it too big */
        padding: 2px;
        line-height: 1;
    }

    .small-key-left {
        justify-self: left;
    }

    .small-key-right {
        justify-self: right;
    }


    #left-keys,
    #right-keys {
        display: none;
        position: absolute;
        bottom: 0;
    }

    #left-keys {
        left: 0;
    }

    #right-keys {
        right: 0;
    }

    #screen-area {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys,
    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        display: flex;
    }

    body.kbd-portrait #left-keys,
    body.kbd-portrait #right-keys {
        width: 50%;
        height: 220px;
    }

    body.kbd-landscape #left-keys,
    body.kbd-landscape #right-keys {
        width: 220px;
        height: 100%;
    }

    /* max height in landscape mode */
    body.kbd-landscape #left-keys .key-grid,
    body.kbd-landscape #right-keys .key-grid {
        max-height: 400px;
    }

    body.kbd-portrait #screen-area {
        bottom: 220px;
    }

    body.kbd-landscape #screen-area {
        left: 220px;
        right: 220px;
    }

</style>
<body>
    <div id="screen-area">
        <canvas tabindex="0" id="display" style="display: none;"></canvas>
        <div id="loading">
            <div class="ps-sce">Sony Computer Entertainment</div>
            <div class="ps-logo">
                <svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PlayStation">
                    <defs>
                        <linearGradient id="ps-blue" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0" stop-color="#2b8cff"/>
                            <stop offset="1" stop-color="#0a3f9c"/>
                        </linearGradient>
                    </defs>
                    <!-- "P": dark extrude behind, blue face on top -->
                    <path d="M70,180 L70,45 C70,45 132,37 134,82 C135,111 92,110 70,107"
                          fill="none" stroke="#05204d" stroke-width="30"
                          stroke-linecap="round" stroke-linejoin="round" transform="translate(7,8)"/>
                    <path d="M70,180 L70,45 C70,45 132,37 134,82 C135,111 92,110 70,107"
                          fill="none" stroke="url(#ps-blue)" stroke-width="30"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- "S": green + yellow 3D faces, red front -->
                    <path d="M198,92 C198,66 170,58 150,62 C126,67 122,90 146,99 C172,108 202,110 198,146 C195,176 162,186 134,174 C123,169 117,160 118,151"
                          fill="none" stroke="#00a63c" stroke-width="30"
                          stroke-linecap="round" stroke-linejoin="round" transform="translate(-5,7)"/>
                    <path d="M198,92 C198,66 170,58 150,62 C126,67 122,90 146,99 C172,108 202,110 198,146 C195,176 162,186 134,174 C123,169 117,160 118,151"
                          fill="none" stroke="#ffcf00" stroke-width="30"
                          stroke-linecap="round" stroke-linejoin="round" transform="translate(6,-5)"/>
                    <path d="M198,92 C198,66 170,58 150,62 C126,67 122,90 146,99 C172,108 202,110 198,146 C195,176 162,186 134,174 C123,169 117,160 118,151"
                          fill="none" stroke="#e60019" stroke-width="30"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="ps-wordmark">PlayStation</div>
            </div>
            <div class="ps-status" id="loading-status">Loading...</div>
        </div>
    </div>
    <div id="left-keys" class="keypad-part">
        <div class="key-grid left-grid">
            <button data-key="Digit1" class="key">1</button>
            <button data-key="Digit2" class="key">2 <span>ABC</span></button>
            <button data-key="Digit3" class="key">3 <span>DEF</span></button>
            <button data-key="Digit4" class="key">4 <span>GHI</span></button>
            <button data-key="Digit5" class="key">5 <span>JKL</span></button>
            <button data-key="Digit6" class="key">6 <span>MNO</span></button>
            <button data-key="Digit7" class="key">7 <span>PQRS</span></button>
            <button data-key="Digit8" class="key">8 <span>TUV</span></button>
            <button data-key="Digit9" class="key">9 <span>WXYZ</span></button>
            <button data-key="NumpadAsterisk" class="key">*</button>
            <button data-key="Digit0" class="key">0 <span>+</span></button>
            <button data-key="NumpadDivide" class="key">#</button>
        </div>
    </div>
    <div id="right-keys" class="keypad-part">
         <div class="key-grid right-grid">
            <button data-key="F1" class="key">L</button>
            <button data-key="ArrowUp" class="key arrow-key" aria-label="Up">↑</button>
            <button data-key="F2" class="key">R</button>
            <button data-key="ArrowLeft" class="key arrow-key" aria-label="Left">←</button>
            <button data-key="Enter" class="key ok-key">OK</button>
            <button data-key="ArrowRight" class="key arrow-key" aria-label="Right">→</button>
            <button data-key="Escape" class="key small-key small-key-left">Esc</button>
            <button data-key="ArrowDown" class="key arrow-key" aria-label="Down">↓</button>
            <button data-key="Maximize" class="key small-key small-key-right" aria-label="Maximize">⛶</button>
        </div>
    </div>
    <script src="https://cjrtnc.leaningtech.com/20260317_2978/loader.js"></script>
    <script type="module" src="src/main.js"></script>
    <script type="module" src="controller/controller-play.js"></script>
</body>
</html>
